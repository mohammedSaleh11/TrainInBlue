name: train_in_blue
description: "TrainInBlue - an offline-first workout builder for iOS and Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # iOS-style icons used by Material widgets on Cupertino platforms.
  cupertino_icons: ^1.0.8
  # Cubit-based state management: one source of truth for the workout session.
  flutter_bloc: ^9.1.1
  # Value equality for states and models, enabling predictable rebuilds.
  equatable: ^2.1.0
  # Small key-value store used to persist the workout snapshot atomically.
  shared_preferences: ^2.5.5
  # Responsive sizing against the 390x844 design canvas.
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  # Generates Android/iOS launcher icons from the TrainInBlue brand mark.
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/branding/
    - assets/images/
    - assets/images/onboarding/
    - assets/images/categories/
    - assets/images/exercises/
    - assets/images/exercises/squat.png
    - assets/images/exercises/push_up.png
    - assets/images/exercises/bent_over_row.png
    - assets/images/exercises/reverse_lunge.png
    - assets/images/exercises/plank.png
    - assets/images/exercises/jumping_jacks.png

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0A1E4A"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
